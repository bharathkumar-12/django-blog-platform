{% extends "base.html" %} {% block title %}Delete Post{% endblock %} {% block
content %}
<div class="bg-white rounded-xl shadow-sm p-5 sm:p-8 border border-slate-100">
  <h1 class="text-2xl font-semibold mb-2">Delete Post</h1>
  <p class="text-slate-600 mb-6">Are you sure you want to delete this post?</p>

  <div class="mb-6 rounded-lg border border-slate-200 p-4">
    <h2 class="text-lg font-medium">{{ post.title }}</h2>
  </div>

  <form method="post" class="flex flex-wrap gap-3">
    {% csrf_token %}
    <button type="submit" class="px-4 py-2 rounded-lg bg-red-600 text-white">
      Confirm
    </button>
    <a
      href="{% url 'post_detail' post.pk %}"
      class="px-4 py-2 rounded-lg border border-slate-200 bg-white"
    >
      Cancel
    </a>
  </form>
</div>
{% endblock %}
