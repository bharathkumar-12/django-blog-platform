<header class="bg-white border-b border-slate-200">
  <div
    class="max-w-5xl mx-auto px-4 sm:px-6 py-4 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3"
  >
    <a href="{% url 'home' %}" class="text-xl font-semibold tracking-tight"
      >Django Blog</a
    >

    <nav class="flex flex-wrap items-center gap-3 text-sm">
      <a href="{% url 'home' %}" class="text-slate-600 hover:text-slate-900"
        >Home</a
      >
      {% if user.is_authenticated %}
      <a href="{% url 'post_new' %}" class="text-slate-600 hover:text-slate-900"
        >New Post</a
      >
      <span class="text-slate-500">{{ user.username }}</span>
      <a href="{% url 'logout' %}" class="text-slate-600 hover:text-slate-900"
        >Logout</a
      >
      {% else %}
      <a href="{% url 'login' %}" class="text-slate-600 hover:text-slate-900"
        >Login</a
      >
      <a href="{% url 'signup' %}" class="text-slate-600 hover:text-slate-900"
        >Sign up</a
      >
      {% endif %}
    </nav>
  </div>
</header>
