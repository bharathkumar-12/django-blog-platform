<form method="get" class="mb-6">
  <div class="flex flex-col sm:flex-row gap-2">
    <input
      type="text"
      name="q"
      value="{{ request.GET.q }}"
      placeholder="Search posts..."
      class="w-full rounded-lg border border-slate-200 px-4 py-2"
    />
    {% if request.GET.tag %}
    <input type="hidden" name="tag" value="{{ request.GET.tag }}" />
    {% endif %}
    <button class="px-4 py-2 rounded-lg bg-slate-900 text-white">Search</button>
  </div>
</form>
