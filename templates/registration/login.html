{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
  <div class="max-w-md mx-auto bg-white rounded-xl shadow-sm p-8 border border-slate-100">
    <h1 class="text-2xl font-semibold mb-4">Sign in</h1>
    <form method="post" class="space-y-4">
      {% csrf_token %}
      {{ form.non_field_errors }}
      <div>
        <label class="block text-sm font-medium text-slate-700">Username</label>
        {{ form.username }}
        {{ form.username.errors }}
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700">Password</label>
        {{ form.password }}
        {{ form.password.errors }}
      </div>
      <button type="submit" class="w-full px-4 py-2 rounded-lg bg-slate-900 text-white">
        Login
      </button>
    </form>
  </div>
{% endblock content %}
